openapi: 3.0.3

info:
  title: Currency Exchange API
  version: 1.0.0
  description: API for managing accounts and currency exchange.

servers:
  - url: /

paths:
  /accounts:
    post:
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '200':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetailsResponse'
  /accounts/{id}:
    get:
      summary: Get account information
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Account info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetailsResponse'
  /accounts/{id}/exchange:
    post:
      operationId: exchangeCurrency
      summary: Exchange currency for an account
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExchangeRequest'
      responses:
        '200':
          description: Exchange completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetailsResponse'

components:
  schemas:
    CreateAccountRequest:
      type: object
      required:
        - firstName
        - lastName
        - initialBalancePLN
      properties:
        firstName:
          type: string
        lastName:
          type: string
        initialBalancePLN:
          type: string
          format: bigdecimal
    ExchangeRequest:
      type: object
      required:
        - fromCurrency
        - toCurrency
        - amount
      properties:
        fromCurrency:
          type: string
          description: '"PLN" or "USD"'
        toCurrency:
          type: string
          description: 'Target currency (e.g., "PLN" or "USD")'
        amount:
          type: string
          format: bigdecimal
    AccountDetailsResponse:
      type: object
      required:
        - id
        - firstName
        - lastName
        - balancePLN
        - balanceUSD
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        balancePLN:
          type: string
          format: bigdecimal
        balanceUSD:
          type: string
          format: bigdecimal
