openapi: 3.0.3

info:
  title: Currency Exchange API
  version: 1.0.0
  description: API for managing accounts and currency exchange.

servers:
  - url: /

paths:
  /accounts:
    post:
      summary: Create a new account
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '200':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetailsResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "INVALID_REQUEST"
                message: "Invalid account creation request."
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /accounts/{id}:
    get:
      summary: Get account information
      operationId: getAccount
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Account info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetailsResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "ACCOUNT_NOT_FOUND"
                message: "Account with given ID not found."
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "INTERNAL_ERROR"
                message: "An unexpected error occurred."
  /accounts/{id}/exchange:
    post:
      summary: Exchange currency for an account
      operationId: exchangeCurrency
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExchangeRequest'
      responses:
        '200':
          description: Exchange completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetailsResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "UNSUPPORTED_CURRENCY"
                message: "Currency not supported for exchange."
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "INTERNAL_ERROR"
                message: "An unexpected error occurred."

components:
  schemas:
    CreateAccountRequest:
      type: object
      required:
        - firstName
        - lastName
        - initialBalancePLN
      properties:
        firstName:
          type: string
        lastName:
          type: string
        initialBalancePLN:
          type: string
          format: bigdecimal
    ExchangeRequest:
      type: object
      required:
        - fromCurrency
        - toCurrency
        - amount
      properties:
        fromCurrency:
          type: string
          description: '"PLN" or "USD"'
        toCurrency:
          type: string
          description: 'Target currency (e.g., "PLN" or "USD")'
        amount:
          type: string
          format: bigdecimal
          description: Amount to exchange. Must be positive.
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    AccountDetailsResponse:
      type: object
      required:
        - id
        - firstName
        - lastName
        - balancePLN
        - balanceUSD
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        balancePLN:
          type: string
          format: bigdecimal
        balanceUSD:
          type: string
          format: bigdecimal
