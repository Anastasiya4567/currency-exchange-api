spring:
  application:
    name: currency-exchange-api
  datasource:
    url: jdbc:h2:file:./data/currencydb
    driverClassName: org.h2.Driver
    username: admin
    password: admin
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true

logging:
  level:
    org.springframework: INFO
